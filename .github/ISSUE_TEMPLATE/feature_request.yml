name: Feature Request
description: Suggest a new feature or improvement for Calagopus
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues to see if this has already been suggested.
        For wings related feature requests, create an issue in [calagopus/wings](https://github.com/calagopus/wings/issues) instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the problem or limitation you're facing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of the feature or change you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Calagopus does this relate to?
      options:
        - Frontend / UI
        - Backend / API
        - Wings
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, mockups, or screenshots about the feature request.
